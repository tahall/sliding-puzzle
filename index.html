<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sliding Puzzle</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: #1a1a2e;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #eee;
      padding: 20px;
    }

    h1 { font-size: clamp(1.4rem, 6vw, 2rem); letter-spacing: 2px; color: #e94560; }

    /* ── Difficulty selector ─────────────────────────────────────── */
    #difficulty { display: flex; border-radius: 6px; overflow: hidden; border: 1px solid #2a5a90; }
    .diff-btn {
      padding: 7px 16px; background: #0f3460; color: #778;
      border: none; border-right: 1px solid #2a5a90;
      cursor: pointer; font-size: 0.85rem; font-weight: 600;
      transition: background 0.15s, color 0.15s;
    }
    .diff-btn:last-child { border-right: none; }
    .diff-btn:hover { background: #16405a; color: #cce; }
    .diff-btn.active { background: #e94560; color: #fff; cursor: default; }

    /* ── Stats ───────────────────────────────────────────────────── */
    #info { display: flex; gap: 40px; }
    .stat label { color: #aaa; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; display: block; text-align: center; }
    .stat span  { display: block; font-size: 1.4rem; font-weight: bold; color: #e94560; text-align: center; min-width: 3ch; }

    /* ── Board ───────────────────────────────────────────────────── */
    #board-wrap { position: relative; }
    #board { position: relative; background: #16213e; border-radius: 8px; box-shadow: 0 0 30px rgba(233,69,96,0.3); }

    /* ── Tiles ───────────────────────────────────────────────────── */
    .tile {
      position: absolute; display: flex; align-items: center; justify-content: center;
      border-radius: 5px; font-weight: bold; cursor: pointer; overflow: hidden;
      background: linear-gradient(135deg, #0f3460, #1a4a80);
      color: #cce; border: 1px solid #2a5a90;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
      transition: transform 140ms ease, box-shadow 80ms ease;
    }
    .tile.no-anim { transition: none !important; }
    .tile:hover { box-shadow: 0 0 10px rgba(233,69,96,0.5), inset 0 1px 0 rgba(255,255,255,0.1); z-index: 2; }
    .tile.movable {
      background: linear-gradient(135deg, #16405a, #1e6080); border-color: #3a9abf; color: #aef;
      box-shadow: 0 0 6px rgba(100,200,255,0.25), inset 0 1px 0 rgba(255,255,255,0.15);
    }
    .tile.has-image { background-color: #000; border-color: rgba(0,0,0,0.5); color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.9), 0 0 6px rgba(0,0,0,0.7); }
    .tile.has-image.movable { border: 2px solid #3af; box-shadow: 0 0 8px rgba(80,180,255,0.6), inset 0 0 0 1px rgba(80,180,255,0.3); }
    .tile.has-image:hover { box-shadow: 0 0 12px rgba(233,69,96,0.7); }
    #board.hide-numbers .tile-label { display: none; }

    /* ── Overlay ─────────────────────────────────────────────────── */
    #overlay {
      display: none; position: absolute; inset: 0; background: rgba(26,26,46,0.9); border-radius: 8px;
      align-items: center; justify-content: center; font-size: 2rem; font-weight: bold;
      color: #4caf50; flex-direction: column; gap: 10px; z-index: 10;
    }
    #overlay.show { display: flex; }
    #overlay .sub { font-size: 1rem; color: #aaa; }
    #overlay canvas { border-radius: 6px; box-shadow: 0 0 20px rgba(76,175,80,0.4); max-width: 200px; max-height: 200px; }

    /* ── Buttons ─────────────────────────────────────────────────── */
    #controls, #img-controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .ctrl {
      padding: 9px 20px; border: none; border-radius: 6px;
      font-size: 0.9rem; font-weight: 600; cursor: pointer; letter-spacing: 0.4px;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .ctrl:hover  { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,0.4); }
    .ctrl:active { transform: translateY(0); }
    label.ctrl { display: inline-block; line-height: normal; }
    label.ctrl input { display: none; }

    #btn-shuffle { background: #e94560; color: #fff; }
    #btn-solve   { background: #0f3460; color: #aef; border: 1px solid #3a9abf; }
    #btn-upload  { background: #1a5a30; color: #8f8; border: 1px solid #3a9a60; }
    #btn-mute    { background: #2a2a3a; color: #aaa; border: 1px solid #4a4a6a; }
    #btn-mute.muted { color: #556; }
    #btn-numbers { background: #2a3a5a; color: #adf; border: 1px solid #3a6a90; }
    #btn-clear   { background: #3a2a1a; color: #fa8; border: 1px solid #8a4a20; }
    #img-controls { display: none; }

    /* ── Gallery ─────────────────────────────────────────────────── */
    #gallery-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }

    /* Category tabs */
    #cat-tabs { display: flex; border-radius: 6px; overflow: hidden; border: 1px solid #2a5a90; }
    .cat-btn {
      padding: 5px 14px; background: #0f3460; color: #778;
      border: none; border-right: 1px solid #2a5a90;
      cursor: pointer; font-size: 0.8rem; font-weight: 600;
      transition: background 0.15s, color 0.15s;
    }
    .cat-btn:last-child { border-right: none; }
    .cat-btn:hover  { background: #16405a; color: #cce; }
    .cat-btn.active { background: #e94560; color: #fff; cursor: default; }

    /* Scrollable thumbnail row */
    #gallery {
      display: flex; gap: 8px;
      max-width: min(590px, calc(100vw - 40px)); overflow-x: auto;
      padding: 2px 2px 6px;
      scrollbar-width: thin; scrollbar-color: #2a5a90 transparent;
    }
    #gallery::-webkit-scrollbar { height: 4px; }
    #gallery::-webkit-scrollbar-thumb { background: #2a5a90; border-radius: 2px; }

    .preset-btn {
      flex-shrink: 0; display: flex; flex-direction: column; align-items: center;
      gap: 4px; background: none; border: none; padding: 0; cursor: pointer;
    }
    .preset-thumb {
      width: 76px; height: 76px; object-fit: cover;
      border-radius: 5px; border: 2px solid #2a3a5a; display: block;
      background: #16213e; transition: border-color 0.15s, box-shadow 0.15s;
    }
    .preset-thumb.broken {
      /* show placeholder text instead of broken icon */
      display: flex; align-items: center; justify-content: center;
      font-size: 0.6rem; color: #556; text-align: center; padding: 4px;
    }
    .preset-btn:hover .preset-thumb { border-color: #e94560; box-shadow: 0 0 8px rgba(233,69,96,0.4); }
    .preset-btn.active .preset-thumb { border-color: #e94560; box-shadow: 0 0 10px rgba(233,69,96,0.6); }
    .preset-name { font-size: 0.62rem; color: #778; text-align: center; max-width: 76px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .preset-btn.active .preset-name { color: #e94560; }

    #message { font-size: 1rem; font-weight: 600; min-height: 1.4rem; letter-spacing: 0.5px; color: #778; }
  </style>
</head>
<body>

<h1>SLIDING PUZZLE</h1>

<div id="difficulty">
  <button class="diff-btn" data-size="3">3×3</button>
  <button class="diff-btn" data-size="4">4×4</button>
  <button class="diff-btn active" data-size="6">6×6</button>
  <button class="diff-btn" data-size="8">8×8</button>
  <button class="diff-btn" data-size="10">10×10</button>
</div>

<div id="info">
  <div class="stat"><label>Moves</label><span id="move-count">0</span></div>
  <div class="stat"><label>Time</label><span id="timer">0:00</span></div>
</div>

<div id="board-wrap">
  <div id="board"></div>
  <div id="overlay">
    <div>Puzzle Solved!</div>
    <div class="sub" id="solve-stats"></div>
  </div>
</div>

<div id="controls">
  <button id="btn-shuffle" class="ctrl">Shuffle</button>
  <button id="btn-solve"   class="ctrl">Show Solution</button>
  <label  id="btn-upload"  class="ctrl">
    Upload Image
    <input type="file" id="file-input" accept="image/*">
  </label>
  <button id="btn-mute"    class="ctrl">Sound: On</button>
</div>

<!-- preset image gallery -->
<div id="gallery-wrap">
  <div id="cat-tabs">
    <button class="cat-btn active" data-cat="art">Art</button>
    <button class="cat-btn" data-cat="nasa">NASA</button>
    <button class="cat-btn" data-cat="animals">Dogs &amp; Cats</button>
    <button class="cat-btn" data-cat="flowers">Flowers</button>
  </div>
  <div id="gallery"></div>
</div>

<!-- shown only when an image is loaded -->
<div id="img-controls">
  <button id="btn-numbers" class="ctrl">Numbers: Off</button>
  <button id="btn-clear"   class="ctrl">Clear Image</button>
</div>

<div id="message"></div>

<script>
(() => {
  // ── Layout constants ──────────────────────────────────────────
  const GAP     = 3;
  const PADDING = 6;
  const ANIM_MS = 140;

  function boardTarget() {
    // Leave 40px for body padding (20px each side); cap at 560px
    return Math.min(560, window.innerWidth - 40);
  }

  // ── Game state ────────────────────────────────────────────────
  let SIZE, BLANK, TILE_SIZE, BOARD_PX, FONT_SIZE;
  let tiles       = [];
  let tileEls     = new Map();
  let moveHistory = [];
  let moves = 0, seconds = 0;
  let timerHandle = null;
  let started = false, solved = false, replaying = false, animating = false;

  // ── Image state ───────────────────────────────────────────────
  let imageDataUrl = null;
  let showNumbers  = false;

  // ── Sound ─────────────────────────────────────────────────────
  let audioCtx = null;
  let muted    = false;

  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }
  function playSlide() {
    if (muted) return;
    const ctx = getAudioCtx(), osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(300, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.09);
    gain.gain.setValueAtTime(0.18, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.09);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.09);
  }
  function playWin() {
    if (muted) return;
    const ctx = getAudioCtx();
    [523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => {
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      const t = ctx.currentTime + i * 0.13;
      osc.type = 'sine'; osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.22, t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      osc.start(t); osc.stop(t + 0.35);
    });
  }

  // ── DOM ───────────────────────────────────────────────────────
  const boardEl       = document.getElementById('board');
  const overlayEl     = document.getElementById('overlay');
  const moveCountEl   = document.getElementById('move-count');
  const timerEl       = document.getElementById('timer');
  const messageEl     = document.getElementById('message');
  const imgControlsEl = document.getElementById('img-controls');
  const btnNumbers    = document.getElementById('btn-numbers');

  // ── Grid helpers ──────────────────────────────────────────────
  const rowOf    = i => Math.floor(i / SIZE);
  const colOf    = i => i % SIZE;
  const idxOf    = (r, c) => r * SIZE + c;
  const emptyPos = () => tiles.indexOf(BLANK);

  function neighbours(i) {
    const r = rowOf(i), c = colOf(i), nb = [];
    if (r > 0)        nb.push(idxOf(r-1, c));
    if (r < SIZE - 1) nb.push(idxOf(r+1, c));
    if (c > 0)        nb.push(idxOf(r, c-1));
    if (c < SIZE - 1) nb.push(idxOf(r, c+1));
    return nb;
  }

  function tilePixel(pos) {
    return [PADDING + colOf(pos) * (TILE_SIZE + GAP), PADDING + rowOf(pos) * (TILE_SIZE + GAP)];
  }

  // ── Layout ────────────────────────────────────────────────────
  function computeLayout(size) {
    SIZE      = size;
    BLANK     = SIZE * SIZE - 1;
    TILE_SIZE = Math.floor((boardTarget() - 2*PADDING - (SIZE-1)*GAP) / SIZE);
    BOARD_PX  = 2*PADDING + SIZE*TILE_SIZE + (SIZE-1)*GAP;
    FONT_SIZE = TILE_SIZE >= 100 ? '1.8rem' : TILE_SIZE >= 70 ? '1.3rem' : TILE_SIZE >= 55 ? '1.0rem' : '0.85rem';
  }

  // Resize board in-place without reshuffling
  function resizeBoard() {
    computeLayout(SIZE);
    boardEl.style.width  = BOARD_PX + 'px';
    boardEl.style.height = BOARD_PX + 'px';
    tileEls.forEach((el, val) => {
      el.classList.add('no-anim');
      el.style.width = el.style.height = TILE_SIZE + 'px';
      el.style.fontSize = FONT_SIZE;
      if (imageDataUrl) applyImageToTile(el, val);
    });
    placeAll();
    requestAnimationFrame(() => tileEls.forEach(el => el.classList.remove('no-anim')));
  }

  // ── Solvability ───────────────────────────────────────────────
  function isSolvable(arr) {
    const flat = arr.filter(v => v !== BLANK);
    let inv = 0;
    for (let i = 0; i < flat.length - 1; i++)
      for (let j = i + 1; j < flat.length; j++)
        if (flat[i] > flat[j]) inv++;
    if (SIZE % 2 === 1) return inv % 2 === 0;
    const blankRowFromBottom = SIZE - 1 - rowOf(arr.indexOf(BLANK));
    return (inv + blankRowFromBottom) % 2 === 0;
  }

  function isGoal() { return tiles.every((v, i) => v === i); }

  // ── Image processing ──────────────────────────────────────────
  function cropToSquare(img) {
    const MASTER = 800, canvas = document.createElement('canvas');
    canvas.width = canvas.height = MASTER;
    const ctx = canvas.getContext('2d');
    const s = Math.min(img.naturalWidth, img.naturalHeight);
    ctx.drawImage(img, (img.naturalWidth - s) / 2, (img.naturalHeight - s) / 2, s, s, 0, 0, MASTER, MASTER);
    return canvas.toDataURL('image/jpeg', 0.92);
  }

  function applyImageToTile(el, val) {
    const r = Math.floor(val / SIZE), c = val % SIZE, totalPx = SIZE * TILE_SIZE;
    el.style.backgroundImage    = `url('${imageDataUrl}')`;
    el.style.backgroundSize     = `${totalPx}px ${totalPx}px`;
    el.style.backgroundPosition = `${-c * TILE_SIZE}px ${-r * TILE_SIZE}px`;
    el.classList.add('has-image');
  }

  function removeImageFromTile(el) {
    el.style.backgroundImage = el.style.backgroundSize = el.style.backgroundPosition = '';
    el.classList.remove('has-image');
  }

  // Shared: apply a cropped square data URL to the current board
  function applyLoadedImage(dataUrl) {
    imageDataUrl = dataUrl;
    showNumbers  = false;
    btnNumbers.textContent = 'Numbers: Off';
    imgControlsEl.style.display = 'flex';
    messageEl.textContent = '';
    tileEls.forEach((el, val) => applyImageToTile(el, val));
    boardEl.classList.add('hide-numbers');
  }

  // ── Preset gallery ────────────────────────────────────────────
  // Images are public domain artworks and NASA photos from Wikimedia Commons,
  // plus freely-licensed (CC) animal and flower photos.
  // URLs use the Special:Redirect/file API so we don't need hash paths.
  const WIKI = (file, w) =>
    `https://commons.wikimedia.org/w/index.php?title=Special:Redirect/file/${encodeURIComponent(file)}&width=${w}`;

  const PRESETS = [
    // Art — public domain paintings
    { cat: 'art', name: 'Starry Night',    file: 'Van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg' },
    { cat: 'art', name: 'The Great Wave',  file: 'The_Great_Wave_off_Kanagawa.jpg' },
    { cat: 'art', name: 'Sunflowers',      file: 'Vincent_Willem_van_Gogh,_Dutch_-_Sunflowers_-_Google_Art_Project.jpg' },
    { cat: 'art', name: 'Water Lilies',    file: 'Claude_Monet_-_Water_Lilies_-_1906,_Ryerson.jpg' },
    { cat: 'art', name: 'The Kiss',        file: 'Klimt_-_Der_Kuss.jpeg' },
    { cat: 'art', name: 'Pearl Earring',   file: 'Meisje_met_de_parel.jpg' },
    // NASA — public domain (US government works)
    { cat: 'nasa', name: 'Blue Marble',      file: 'The_Earth_seen_from_Apollo_17.jpg' },
    { cat: 'nasa', name: 'Earthrise',        file: 'NASA-Apollo8-Dec24-Earthrise.jpg' },
    { cat: 'nasa', name: 'Pillars of Creation', file: 'Pillars_of_Creation_(NIRCam_Image).jpg' },
    { cat: 'nasa', name: 'Saturn',           file: 'Saturn_from_Cassini_Orbiter_(2004-10-06).jpg' },
    // Dogs & Cats — freely licensed photos (CC)
    { cat: 'animals', name: 'Yellow Lab',      file: 'Labrador_Retriever_-_Yellow.JPG' },
    { cat: 'animals', name: 'Beagle Pup',      file: 'Beagle_puppy_6_weeks.JPG' },
    { cat: 'animals', name: 'Golden Retriever', file: 'Golden_Retriever_Hund_Dog.JPG' },
    { cat: 'animals', name: 'Orange Tabby',    file: 'Cat_November_2010-1a.jpg' },
    { cat: 'animals', name: 'Cat on Snow',     file: 'Felis_catus-cat_on_snow.jpg' },
    { cat: 'animals', name: 'Blue-Eyed Tabby', file: 'Tabby_cat_with_blue_eyes-3336579.jpg' },
    // Flowers — freely licensed photos + one painting (CC / PD)
    { cat: 'flowers', name: 'Sunflower',        file: 'Sunflower_from_Silesia.JPG' },
    { cat: 'flowers', name: 'Red Rose',         file: 'Small_Red_Rose.JPG' },
    { cat: 'flowers', name: 'Cherry Blossoms',  file: 'Cherry_Blossoms_UBC_02.JPG' },
    { cat: 'flowers', name: 'Irises',           file: 'Irises-Vincent_van_Gogh.jpg' },
    { cat: 'flowers', name: 'Lotus',            file: 'Lotus_flower_(978659).jpg' },
  ];

  // Resolve a Wikimedia filename to a real upload.wikimedia.org URL via the
  // CORS-enabled API (origin=* makes the API respond with CORS headers).
  // upload.wikimedia.org also has Access-Control-Allow-Origin: *, so loading
  // the returned URL with crossOrigin='anonymous' lets us draw it to canvas.
  async function resolveWikiUrl(file, width) {
    const params = new URLSearchParams({
      action: 'query', format: 'json', origin: '*',
      titles: `File:${file}`, prop: 'imageinfo',
      iiprop: 'url', iiurlwidth: String(width),
    });
    const resp = await fetch(`https://commons.wikimedia.org/w/api.php?${params}`);
    if (!resp.ok) throw new Error(`API HTTP ${resp.status}`);
    const data  = await resp.json();
    const pages = data.query.pages;
    const page  = pages[Object.keys(pages)[0]];
    if (!page.imageinfo) throw new Error('File not found on Wikimedia Commons');
    return page.imageinfo[0].thumburl || page.imageinfo[0].url;
  }

  async function loadPreset(preset, btn) {
    messageEl.textContent = 'Loading…';
    btn.disabled = true;
    try {
      const imageUrl = await resolveWikiUrl(preset.file, 1200);
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        document.querySelectorAll('.preset-btn.active').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        btn.disabled = false;
        applyLoadedImage(cropToSquare(img));
      };
      img.onerror = () => {
        btn.disabled = false;
        messageEl.textContent = `Could not load "${preset.name}".`;
      };
      img.src = imageUrl;
    } catch (err) {
      btn.disabled = false;
      messageEl.textContent = err.message.includes('not found')
        ? `"${preset.name}" not found on Wikimedia.`
        : 'Could not load image — check network connection.';
    }
  }

  let activeCat = 'art';

  function buildGallery() {
    const galleryEl = document.getElementById('gallery');
    galleryEl.innerHTML = '';
    PRESETS.filter(p => p.cat === activeCat).forEach(preset => {
      const btn = document.createElement('button');
      btn.className = 'preset-btn';
      btn.title = preset.name;

      // Thumbnail — displayed with <img>, no canvas, no CORS needed
      const img = document.createElement('img');
      img.className = 'preset-thumb';
      img.alt = preset.name;
      img.src = WIKI(preset.file, 150);
      img.onerror = () => {
        img.style.display = 'none';
        const ph = document.createElement('div');
        ph.className = 'preset-thumb broken';
        ph.textContent = preset.name;
        btn.insertBefore(ph, img);
      };

      const label = document.createElement('span');
      label.className = 'preset-name';
      label.textContent = preset.name;

      btn.appendChild(img);
      btn.appendChild(label);
      btn.addEventListener('click', () => loadPreset(preset, btn));
      galleryEl.appendChild(btn);
    });
  }

  // Category tab clicks
  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.cat === activeCat) return;
      document.querySelector('.cat-btn.active').classList.remove('active');
      btn.classList.add('active');
      activeCat = btn.dataset.cat;
      buildGallery();
    });
  });

  // ── Board init ────────────────────────────────────────────────
  function initBoard() {
    boardEl.innerHTML = '';
    boardEl.style.width  = BOARD_PX + 'px';
    boardEl.style.height = BOARD_PX + 'px';
    tileEls = new Map();

    for (let val = 0; val < BLANK; val++) {
      const el = document.createElement('div');
      el.className = 'tile no-anim';
      el.style.width = el.style.height = TILE_SIZE + 'px';
      el.style.fontSize = FONT_SIZE;
      const label = document.createElement('span');
      label.className = 'tile-label';
      label.textContent = val + 1;
      el.appendChild(label);
      el.addEventListener('click', () => applyMove(tiles.indexOf(val)));
      boardEl.appendChild(el);
      tileEls.set(val, el);
      if (imageDataUrl) applyImageToTile(el, val);
    }

    boardEl.classList.toggle('hide-numbers', imageDataUrl !== null && !showNumbers);
    placeAll();
    requestAnimationFrame(() => tileEls.forEach(el => el.classList.remove('no-anim')));
    updateMovable();
  }

  function placeAll() {
    tileEls.forEach((el, val) => {
      const [x, y] = tilePixel(tiles.indexOf(val));
      el.style.transform = `translate(${x}px, ${y}px)`;
    });
  }

  function updateMovable() {
    const movable = new Set(neighbours(emptyPos()));
    tileEls.forEach((el, val) => el.classList.toggle('movable', movable.has(tiles.indexOf(val))));
  }

  // ── New game ──────────────────────────────────────────────────
  function newGame() {
    replaying = false; animating = false;
    stopTimer();
    overlayEl.classList.remove('show');
    messageEl.textContent = '';
    moves = 0; seconds = 0; started = false; solved = false;
    moveHistory = [];
    moveCountEl.textContent = '0'; timerEl.textContent = '0:00';

    do {
      tiles = Array.from({length: SIZE*SIZE}, (_, i) => i);
      for (let i = tiles.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
      }
    } while (!isSolvable(tiles) || isGoal());

    initBoard();
  }

  // ── Move ──────────────────────────────────────────────────────
  function applyMove(tilePos, record = true) {
    if (solved || replaying || animating) return false;
    const empty = emptyPos();
    if (!neighbours(empty).includes(tilePos)) return false;
    if (!started) { startTimer(); started = true; }
    if (record) moveHistory.push({emptyBefore: empty, tilePos});
    slideToEmpty(tilePos, empty);
    playSlide();
    moves++;
    moveCountEl.textContent = moves;
    animating = true;
    setTimeout(() => { animating = false; if (isGoal()) onWin(); }, ANIM_MS);
    return true;
  }

  function slideToEmpty(tilePos, empty) {
    const val = tiles[tilePos];
    [tiles[empty], tiles[tilePos]] = [tiles[tilePos], tiles[empty]];
    const [x, y] = tilePixel(empty);
    tileEls.get(val).style.transform = `translate(${x}px, ${y}px)`;
    updateMovable();
  }

  // ── Win ───────────────────────────────────────────────────────
  function onWin() {
    stopTimer(); solved = true; playWin();
    overlayEl.innerHTML = '';
    const title = document.createElement('div');
    title.textContent = 'Puzzle Solved!';
    const sub = document.createElement('div');
    sub.className = 'sub';
    sub.textContent = `${moves} moves · ${fmt(seconds)}`;
    overlayEl.appendChild(title);
    overlayEl.appendChild(sub);
    if (imageDataUrl) {
      const img = new Image();
      img.onload = () => {
        const cv = document.createElement('canvas');
        const sz = Math.min(180, BOARD_PX * 0.4);
        cv.width = cv.height = sz;
        cv.getContext('2d').drawImage(img, 0, 0, sz, sz);
        overlayEl.appendChild(cv);
      };
      img.src = imageDataUrl;
    }
    overlayEl.classList.add('show');
  }

  // ── Timer ─────────────────────────────────────────────────────
  function startTimer() { timerHandle = setInterval(() => { seconds++; timerEl.textContent = fmt(seconds); }, 1000); }
  function stopTimer()  { clearInterval(timerHandle); timerHandle = null; }
  function fmt(s) { return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }

  // ── Show Solution ─────────────────────────────────────────────
  document.getElementById('btn-solve').addEventListener('click', () => {
    if (replaying || solved) return;
    if (!moveHistory.length) { messageEl.textContent = 'Make at least one move first.'; return; }
    replaying = true; animating = false; stopTimer();
    messageEl.textContent = 'Replaying solution…';
    const steps = [...moveHistory].reverse().map(h => h.emptyBefore);
    let i = 0;
    function step() {
      if (i >= steps.length) {
        replaying = false;
        moves = 0; seconds = 0; started = false; moveHistory = [];
        moveCountEl.textContent = '0'; timerEl.textContent = '0:00';
        messageEl.textContent = 'Board restored to original shuffle.';
        return;
      }
      const dest = steps[i++], empty = emptyPos();
      if (neighbours(empty).includes(dest)) slideToEmpty(dest, empty);
      setTimeout(step, ANIM_MS + 20);
    }
    step();
  });

  document.getElementById('btn-shuffle').addEventListener('click', newGame);

  // ── Difficulty ────────────────────────────────────────────────
  document.querySelectorAll('.diff-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.classList.contains('active')) return;
      document.querySelector('.diff-btn.active').classList.remove('active');
      btn.classList.add('active');
      computeLayout(parseInt(btn.dataset.size, 10));
      newGame();
    });
  });

  // ── Image upload ──────────────────────────────────────────────
  document.getElementById('file-input').addEventListener('change', e => {
    const file = e.target.files[0]; if (!file) return;
    e.target.value = '';
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        document.querySelectorAll('.preset-btn.active').forEach(b => b.classList.remove('active'));
        applyLoadedImage(cropToSquare(img));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });

  btnNumbers.addEventListener('click', () => {
    showNumbers = !showNumbers;
    btnNumbers.textContent = showNumbers ? 'Numbers: On' : 'Numbers: Off';
    boardEl.classList.toggle('hide-numbers', !showNumbers);
  });

  document.getElementById('btn-clear').addEventListener('click', () => {
    imageDataUrl = null; showNumbers = true;
    imgControlsEl.style.display = 'none';
    boardEl.classList.remove('hide-numbers');
    tileEls.forEach(el => removeImageFromTile(el));
    document.querySelectorAll('.preset-btn.active').forEach(b => b.classList.remove('active'));
  });

  // ── Mute ──────────────────────────────────────────────────────
  document.getElementById('btn-mute').addEventListener('click', function () {
    muted = !muted;
    this.textContent = muted ? 'Sound: Off' : 'Sound: On';
    this.classList.toggle('muted', muted);
  });

  // ── Keyboard ──────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (solved || replaying) return;
    const empty = emptyPos(), r = rowOf(empty), c = colOf(empty);
    const map = {
      ArrowUp:    r < SIZE-1 ? idxOf(r+1, c) : -1,
      ArrowDown:  r > 0      ? idxOf(r-1, c) : -1,
      ArrowLeft:  c < SIZE-1 ? idxOf(r, c+1) : -1,
      ArrowRight: c > 0      ? idxOf(r, c-1) : -1,
    };
    const target = map[e.key];
    if (target !== undefined && target !== -1) { e.preventDefault(); applyMove(target); }
  });

  // ── Responsive resize ─────────────────────────────────────────
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      const prev = BOARD_PX;
      computeLayout(SIZE);
      if (BOARD_PX !== prev) resizeBoard();
    }, 120);
  });

  // ── Init ──────────────────────────────────────────────────────
  computeLayout(6);
  buildGallery();
  newGame();
})();
</script>
</body>
</html>
